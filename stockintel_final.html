// ── GROQ ──────────────────────────────────────────────────────
var _gt=[];
function groqWait(){
  return new Promise(function(resolve){
    var now=Date.now();
    _gt=_gt.filter(function(t){return now-t<60000;});
    if(_gt.length>=20){
      var wait=60000-(now-_gt[0])+500;
      setTimeout(function(){_gt.push(Date.now());resolve();},wait);
    } else {_gt.push(Date.now());resolve();}
  });
}

function buildContext(co,px){
  var lines=['STOCK: '+co.name+' (NSE:'+co.symbol+')','SCAN: '+ST.label,''];
  if(px&&px.p){
    var chgStr=(px.pct>=0?'▲ +':'▼ ')+Math.abs(px.pct).toFixed(2)+'%';
    lines.push('PRICE TODAY: ₹'+px.p.toFixed(2)+' ('+chgStr+')');
    lines.push('DAY RANGE: ₹'+px.l.toFixed(2)+' – ₹'+px.h.toFixed(2));
    if(px.h52) lines.push('52W RANGE: ₹'+px.l52.toFixed(0)+' – ₹'+px.h52.toFixed(0));
    if(px.avgVol&&px.vol){
      var vs=(px.vol/px.avgVol).toFixed(1);
      if(parseFloat(vs)>1.5) lines.push('VOLUME: '+vs+'x average — unusual activity');
    }
    if(px.h52&&px.p>=px.h52*0.97) lines.push('⚡ Near 52-WEEK HIGH');
    if(px.l52&&px.p<=px.l52*1.05) lines.push('⚠ Near 52-WEEK LOW');
    if(px.closes&&px.closes.length>=3){
      var f=px.closes[0],la=px.closes[px.closes.length-1];
      if(f>0) lines.push('5-DAY TREND: '+(((la-f)/f)*100).toFixed(1)+'%');
    }
  } else {
    lines.push('Price data: not available');
  }
  return lines.join('\n');
}

function callGroq(co,px){
  var ctx=buildContext(co,px);
  var sys='You are an expert Indian stock analyst. Analyse the price data provided and return ONLY valid JSON. No markdown. No backticks. Start with { end with }. Base sentiment strictly on price action: up >2% = POSITIVE, down >2% = NEGATIVE, else NEUTRAL. If near 52w high = bullish signal. Volume spike = alert.';
  var prompt=ctx+'\n\nReturn JSON:\n{"overall_sentiment":"POSITIVE|NEGATIVE|NEUTRAL","sentiment_strength":1-10,"one_liner":"specific observation with numbers","price_outlook":"STRONG_BUY|BUY|HOLD|SELL|STRONG_SELL","alert_level":"CRITICAL|HIGH|MEDIUM|LOW|NONE","alert_headline":"","estimated_impact_pct":0,"news_items":[{"category":"PRICE_ACTION","headline":"price observation","detail":"2 sentences","sentiment":"POSITIVE|NEGATIVE|NEUTRAL","impact":"HIGH|MEDIUM|LOW","impact_reason":"why this matters for traders","price_effect":"UP|DOWN|NEUTRAL","magnitude":"LARGE|MODERATE|SMALL"}],"bull_case":"based on price action","bear_case":"based on price action","key_catalysts":["price levels to watch"],"key_risks":["downside risks"],"fii_activity":{"status":"UNKNOWN","net_flow_cr":null,"consecutive_days":null,"holding_pct":null,"signal":"NEUTRAL"}}';
  return groqWait().then(function(){
    return fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+ST.groqKey},
      body:JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:800,temperature:0.2,
        messages:[{role:'system',content:sys},{role:'user',content:prompt}]})
    });
  }).then(function(r){
    if(!r.ok) return r.text().then(function(b){throw new Error(r.status+' '+b.slice(0,60));});
    return r.json();
  }).then(function(d){
    var txt=(d.choices[0].message.content||'').trim().replace(/```json|```/g,'').trim();
    var j0=txt.indexOf('{'),j1=txt.lastIndexOf('}');
    if(j0>-1&&j1>j0) txt=txt.slice(j0,j1+1);
    return JSON.parse(txt);
  });
}

// ── SCAN ENGINE ───────────────────────────────────────────────
var _q=[],_a=0,_C=5,_wd=null;

function startScan(label,resume){
  if(!ST.groqKey){toast('⚠ Set Groq key first — click SET GROQ KEY','#ef4444');return;}
  ST.label=label||getNowLabel();
  ST.running=true;ST.paused=false;
  if(resume){
    var done=new Set(Object.keys(ST.results));
    _q=COMPANIES.filter(function(c){return !done.has(c.symbol);});
    toast('▶ Resuming — '+_q.length+' stocks remaining','#34d399');
  } else {
    ST.scannedCount=0;_q=COMPANIES.slice();
  }
  _a=0;
  _wd=setInterval(function(){
    if(!ST.running||ST.paused) return;
    if(_a===0&&_q.length>0){toast('🔄 Auto-restart workers','#f97316');for(var i=0;i<_C;i++)nxt();}
  },15000);
  for(var i=0;i<_C;i++) nxt();
  renderAll();
}
function stopScan(){ST.running=false;ST.paused=false;_q=[];_a=0;if(_wd){clearInterval(_wd);_wd=null;}renderAll();}
function pauseScan(){ST.paused=!ST.paused;if(!ST.paused){for(var i=0;i<_C;i++)nxt();}renderAll();}

function nxt(){
  if(!ST.running||ST.paused||_a>=_C||_q.length===0) return;
  var co=_q.shift();
  if(!co){if(_a===0){ST.running=false;if(_wd){clearInterval(_wd);_wd=null;}toast('✅ Done — '+ST.scannedCount+' stocks scanned','#34d399');renderAll();}return;}
  _a++;ST.scanning[co.symbol]=true;renderList();
  scan1(co,0);
}

function scan1(co,attempt){
  // Fetch CMP first, then call Groq with price context
  var px=ST.prices[co.symbol]; // use cached if available
  var priceReady = px ? Promise.resolve(px) :
    withTimeout(
      fetch('https://query1.finance.yahoo.com/v8/finance/chart/'+encodeURIComponent(co.symbol.replace(/[&]/g,'')+'.NS')+'?interval=1d&range=5d',{mode:'cors'})
      .then(function(r){return r.json();})
      .then(function(d){
        var res=d&&d.chart&&d.chart.result&&d.chart.result[0];
        if(!res) return null;
        var meta=res.meta||{};
        var prev=meta.chartPreviousClose||meta.regularMarketPrice;
        var p=meta.regularMarketPrice||0;
        var closes=(res.indicators&&res.indicators.quote&&res.indicators.quote[0]&&res.indicators.quote[0].close)||[];
        var recent=closes.filter(function(c){return c!=null;}).slice(-5);
        var px2={p:p,chg:p-prev,pct:prev?(p-prev)/prev*100:0,h:meta.regularMarketDayHigh||p,l:meta.regularMarketDayLow||p,h52:meta.fiftyTwoWeekHigh||0,l52:meta.fiftyTwoWeekLow||0,vol:meta.regularMarketVolume||0,avgVol:meta.averageDailyVolume3Month||0,closes:recent,ts:Date.now()};
        ST.prices[co.symbol]=px2;
        return px2;
      }),
      8000
    ).catch(function(){return null;});

  priceReady.then(function(px){
    return callGroq(co,px);
  }).then(function(result){
    _a--;delete ST.scanning[co.symbol];
    if(result){
      result.scannedAt=ST.label;
      if(result.news_items) result.news_items.forEach(function(n){n.scanLabel=ST.label;});
      var prev=ST.results[co.symbol];
      if(prev&&prev.news_items){
        var seen={};prev.news_items.forEach(function(n){seen[n.headline]=1;});
        result.news_items=(result.news_items||[]).filter(function(n){return !seen[n.headline];}).concat(prev.news_items);
        result.scanHistory=(prev.scanHistory||[]).concat([{label:ST.label,ts:Date.now(),sentiment:prev.overall_sentiment,alert:prev.alert_level}]);
      } else {
        result.scanHistory=[{label:ST.label,ts:Date.now(),sentiment:result.overall_sentiment,alert:result.alert_level}];
      }
      ST.results[co.symbol]=result;ST.scannedCount++;
      try{localStorage.setItem('sip_r',JSON.stringify(ST.results));}catch(e){}
      if(result.alert_level==='CRITICAL'||result.alert_level==='HIGH'){
        try{new Notification('⚡ '+result.alert_level+': '+co.symbol,{body:result.one_liner||''});}catch(e){}
      }
    }
    renderList();if(ST.selectedId===co.symbol)renderDetail();renderTopBar();nxt();
  }).catch(function(err){
    var msg=(err.message||'').toString();
    var is429=msg.indexOf('429')>-1,is401=msg.indexOf('401')>-1||msg.indexOf('invalid')>-1;
    if(is401){toast('❌ Invalid Groq key — click SET GROQ KEY to update','#ef4444');stopScan();return;}
    if((is429||msg.indexOf('fetch')>-1||msg.indexOf('timeout')>-1)&&attempt<4){
      var wait=[5000,15000,35000,75000][attempt]||75000;
      setTimeout(function(){scan1(co,attempt+1);},wait);
    } else {
      _a--;delete ST.scanning[co.symbol];
      toast('⚠ Skipped '+co.symbol,'#64748b');nxt();
    }
  });
}

// ── RENDER LIST ───────────────────────────────────────────────
function renderList(){
  var lp=document.getElementById('lp');if(!lp)return;
  lp.innerHTML='';
  var inp=document.createElement('input');
  inp.placeholder='Search…';inp.value=ST.filterText;
  inp.style.cssText='width:100%;background:#1e293b;border:none;border-bottom:1px solid #334155;color:#e2e8f0;padding:8px 12px;font-size:11px;font-family:monospace';
  inp.oninput=function(){ST.filterText=this.value;renderList();};
  lp.appendChild(inp);
  var tabs=div('display:flex;border-bottom:1px solid #1e293b;flex-shrink:0');
  [{k:'all',l:'All'},{k:'bull',l:'▲'},{k:'bear',l:'▼'},{k:'alert',l:'⚡'}].forEach(function(t){
    var b=btn(t.l,'flex:1;background:'+(ST.filterTab===t.k?'rgba(96,165,250,0.1)':'transparent')+';border:none;border-bottom:2px solid '+(ST.filterTab===t.k?'#60a5fa':'transparent')+';color:'+(ST.filterTab===t.k?'#60a5fa':'#64748b')+';padding:6px 4px;font-size:11px;font-family:monospace',
      function(){ST.filterTab=t.k;renderList();});
    tabs.appendChild(b);
  });
  lp.appendChild(tabs);
  var list=div('overflow-y:auto;flex:1');
  var ft=ST.filterText.toLowerCase();
  COMPANIES.filter(function(co){
    if(ft&&co.name.toLowerCase().indexOf(ft)<0&&co.symbol.toLowerCase().indexOf(ft)<0) return false;
    var r=ST.results[co.symbol];
    if(ST.filterTab==='bull') return r&&r.overall_sentiment==='POSITIVE';
    if(ST.filterTab==='bear') return r&&r.overall_sentiment==='NEGATIVE';
    if(ST.filterTab==='alert') return r&&r.alert_level&&r.alert_level!=='NONE';
    return true;
  }).forEach(function(co){
    var r=ST.results[co.symbol],sc=SENT[r&&r.overall_sentiment]||SENT.NEUTRAL;
    var isSc=!!ST.scanning[co.symbol],isSel=ST.selectedId===co.symbol;
    var px=ST.prices[co.symbol];
    var row=div('padding:8px 12px;border-bottom:1px solid #1e293b;border-left:3px solid '+(isSc?'#60a5fa':r?sc.c:'#1e293b')+';background:'+(isSel?'#1e3a5f':isSc?'rgba(96,165,250,0.04)':'transparent')+';cursor:pointer;position:relative;overflow:hidden');
    if(isSc){var bar=div('position:absolute;bottom:0;left:0;height:1px;width:40%;background:linear-gradient(90deg,transparent,#60a5fa,transparent);animation:slidein 1.5s linear infinite');row.appendChild(bar);}
    var ab=r&&r.alert_level&&r.alert_level!=='NONE'?'<span style="color:'+ALC[r.alert_level]+';font-size:9px;font-family:monospace">'+r.alert_level+'</span>':(isSc?'<span style="color:#60a5fa;font-size:9px;font-family:monospace">…</span>':'');
    var ts=r&&r.scannedAt?r.scannedAt:'';
    var sp=ts.match(/^(\d{2}-[A-Za-z]{3}-\d{4})\s+(\d{2}:\d{2})$/);
    var td=sp?sp[2]+' '+sp[1].slice(0,6):ts;
    row.innerHTML=
      '<div style="display:flex;justify-content:space-between;align-items:center">'+
        '<span style="color:'+(r?sc.c:'#475569')+';font-family:monospace;font-weight:700;font-size:11px">'+co.symbol+'</span>'+
        '<div style="display:flex;gap:4px;align-items:center">'+
          (px?'<span style="color:'+(px.pct>=0?'#34d399':'#f87171')+';font-size:10px;font-family:monospace;font-weight:700">₹'+px.p.toLocaleString('en-IN',{maximumFractionDigits:0})+'</span>':'')+
          ab+'</div></div>'+
      '<div style="display:flex;justify-content:space-between;margin-top:1px">'+
        '<span style="color:#64748b;font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px">'+co.name+'</span>'+
        (px?'<span style="color:'+(px.pct>=0?'#34d399':'#f87171')+';font-size:9px;font-family:monospace">'+(px.pct>=0?'▲':'▼')+Math.abs(px.pct).toFixed(2)+'%</span>':'')+
      '</div>'+
      (td?'<div style="color:#475569;font-size:8px;font-family:monospace;margin-top:1px">🕐 '+td+'</div>':'')+
      (r&&r.one_liner?'<div style="color:#475569;font-size:9px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+r.one_liner+'</div>':'');
    row.onclick=function(){if(r||isSc){ST.selectedId=co.symbol;renderList();renderDetail();}};
    list.appendChild(row);
  });
  lp.appendChild(list);
}

        '<span style="font-size:13px;font-family:monospace;color:'+(px.pct>=0?'#34d399':'#f87171')+';font-weight:600">'+(px.pct>=0?'▲ +':'▼ ')+Math.abs(px.pct).toFixed(2)+'%</span>'+
        '<span style="font-size:10px;color:#94a3b8;font-family:monospace">H:₹'+px.h.toFixed(0)+' L:₹'+px.l.toFixed(0)+(px.h52?' · 52W:₹'+px.l52.toFixed(0)+'-₹'+px.h52.toFixed(0):'')+'</span>'+
        '<button onclick="fetchCMP(''+co.symbol+'')" style="background:transparent;border:1px solid #e2e8f0;color:#94a3b8;border-radius:3px;padding:1px 7px;font-size:9px;font-family:monospace;cursor:pointer">↻</button>'+
      '</div>':'<div style="margin-bottom:6px"><button onclick="fetchCMP(''+co.symbol+'')" style="background:rgba(96,165,250,0.1);border:1px solid #60a5fa;color:#60a5fa;border-radius:3px;padding:3px 10px;font-size:9px;font-family:monospace;cursor:pointer">↻ Load Price</button></div>')+

    else ['🥇','🥈','🥉'].forEach(function(m,i){if(top3[i]){var w=div('display:flex;gap:8px;margin-bottom:8px');var md=div('font-size:18px;flex-shrink:0');md.textContent=m;w.appendChild(md);w.appendChild(newsCard(top3[i]));body.appendChild(w);}});

function newsCard(item){
  var ic=item.impact==='HIGH'?'#f87171':item.impact==='MEDIUM'?'#fb923c':'#475569';
  var sc=SENT[item.sentiment]||SENT.NEUTRAL;
  var card=div('border-left:3px solid '+ic+';background:#fff;border-radius:5px;padding:10px 13px;margin-bottom:8px');
  var sl=item.scanLabel||'';
  var sp=sl.match(/^(\d{2}-[A-Za-z]{3}-\d{4})\s+(\d{2}:\d{2})$/);
  var slD=sp?sp[2]+' '+sp[1].slice(0,6):sl;
  card.innerHTML=
    '<div style="display:flex;justify-content:space-between;margin-bottom:5px">'+
      '<span style="font-size:9px;font-family:monospace;color:#60a5fa;background:rgba(96,165,250,0.1);padding:2px 7px;border-radius:3px">'+(item.category||'NEWS')+'</span>'+
      '<div style="display:flex;gap:4px"><span style="color:'+sc.c+';font-size:9px;font-family:monospace">'+sc.icon+' '+item.sentiment+'</span><span style="color:'+ic+';font-size:9px;font-family:monospace;background:'+ic+'18;border-radius:3px;padding:0 4px">'+item.impact+'</span></div>'+
    '</div>'+
    '<div style="color:#0f172a;font-size:12px;font-weight:700;line-height:1.4;margin-bottom:5px">'+(item.headline||'')+'</div>'+
    (item.detail?'<div style="color:#374151;font-size:11px;line-height:1.6;margin-bottom:6px">'+item.detail+'</div>':'')+
    (item.impact_reason?'<div style="background:rgba(29,78,216,0.05);border-left:3px solid #3b82f6;border-radius:0 4px 4px 0;padding:6px 10px;margin-bottom:5px"><div style="color:#1d4ed8;font-size:9px;font-family:monospace;font-weight:700;margin-bottom:3px">📌 WHY THIS MOVES THE STOCK</div><div style="color:#1e3a8a;font-size:11px;line-height:1.6">'+item.impact_reason+'</div></div>':'')+
    (slD?'<span style="font-size:8px;font-family:monospace;color:#64748b;background:rgba(100,116,139,0.1);border-radius:3px;padding:1px 5px">🕐 '+slD+'</span>':'');
  return card;

function analysisPanel(r,all,pos,neg,hi){
  var wrap=div('display:flex;flex-direction:column;gap:10px');
  var grid=div('display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px');
  [{l:'TOTAL',v:all.length,c:'#60a5fa'},{l:'POSITIVE',v:pos.length,c:'#34d399'},{l:'NEGATIVE',v:neg.length,c:'#f87171'},{l:'HIGH IMPACT',v:hi.length,c:'#fb923c'},{l:'CONFIDENCE',v:(r.sentiment_strength||0)+'/10',c:'#facc15'},{l:'EST MOVE',v:r.estimated_impact_pct!=null?(r.estimated_impact_pct>=0?'+':'')+r.estimated_impact_pct+'%':'N/A',c:'#60a5fa'}].forEach(function(s){
    var sd=div('background:#fff;border:1px solid #e8ecf0;border-radius:4px;padding:9px 11px');
    sd.innerHTML='<div style="color:#94a3b8;font-size:8px;letter-spacing:1px;font-family:monospace;margin-bottom:4px">'+s.l+'</div><div style="color:'+s.c+';font-size:18px;font-weight:700;font-family:monospace">'+s.v+'</div>';
    grid.appendChild(sd);
  });
  wrap.appendChild(grid);
  if(r.bull_case){var b=div('background:rgba(52,211,153,0.05);border:1px solid rgba(52,211,153,0.2);border-radius:4px;padding:10px 12px');b.innerHTML='<div style="color:#34d399;font-size:9px;font-weight:700;font-family:monospace;margin-bottom:5px">▲ BULL CASE</div><div style="color:#475569;font-size:11px;line-height:1.6">'+r.bull_case+'</div>';wrap.appendChild(b);}
  if(r.bear_case){var bb=div('background:rgba(248,113,113,0.05);border:1px solid rgba(248,113,113,0.2);border-radius:4px;padding:10px 12px');bb.innerHTML='<div style="color:#f87171;font-size:9px;font-weight:700;font-family:monospace;margin-bottom:5px">▼ BEAR CASE</div><div style="color:#475569;font-size:11px;line-height:1.6">'+r.bear_case+'</div>';wrap.appendChild(bb);}
  if(r.key_catalysts&&r.key_catalysts.length){var c=div('background:rgba(96,165,250,0.04);border:1px solid rgba(96,165,250,0.14);border-radius:4px;padding:10px 12px');c.innerHTML='<div style="color:#60a5fa;font-size:9px;font-weight:700;font-family:monospace;margin-bottom:6px">🚀 CATALYSTS</div>'+r.key_catalysts.map(function(x){return '<div style="color:#bfdbfe;font-size:11px;padding:2px 0">→ '+x+'</div>';}).join('');wrap.appendChild(c);}
  if(r.key_risks&&r.key_risks.length){var rr=div('background:rgba(251,146,60,0.04);border:1px solid rgba(251,146,60,0.14);border-radius:4px;padding:10px 12px');rr.innerHTML='<div style="color:#fb923c;font-size:9px;font-weight:700;font-family:monospace;margin-bottom:6px">⚠ RISKS</div>'+r.key_risks.map(function(x){return '<div style="color:#fed7aa;font-size:11px;padding:2px 0">⚠ '+x+'</div>';}).join('');wrap.appendChild(rr);}
  return wrap;
}

var FII={loading:false,lastFetch:0,deals:[],agg:[],log:[],window:'7d',inst:'all'};
function fiiWin(b){FII.window=b.getAttribute('data-w');renderFII();}
function fiiInst(b){FII.inst=b.getAttribute('data-k');renderFII();}
function wMs(w){var n=Date.now();return w==='3d'?n-3*86400000:w==='7d'?n-7*86400000:w==='15d'?n-15*86400000:n-31*86400000;}
function detInst(txt){
  if(/HDFC.{0,15}(MUTUAL|MF|AMC|FUND)/i.test(txt)) return {type:'MF',label:'HDFC AMC'};
  if(/ICICI.{0,15}(PRUDENTIAL|PRU|MF|AMC|FUND)/i.test(txt)) return {type:'MF',label:'ICICI PRU'};
  if(/SBI.{0,15}(MUTUAL|MF|AMC|FUND)/i.test(txt)) return {type:'MF',label:'SBI MF'};
  if(/MORGAN STANLEY/i.test(txt)) return {type:'FII',label:'Morgan Stanley'};
  if(/GOLDMAN/i.test(txt)) return {type:'FII',label:'Goldman Sachs'};
  if(/NOMURA/i.test(txt)) return {type:'FII',label:'Nomura'};
  if(/JP.?MORGAN/i.test(txt)) return {type:'FII',label:'JP Morgan'};
  if(/BLACKROCK/i.test(txt)) return {type:'FII',label:'BlackRock'};
  if(/NORGES/i.test(txt)) return {type:'FII',label:'Norges Bank'};
  if(/FII|FPI|FOREIGN (PORTFOLIO|INSTITUTIONAL)/i.test(txt)) return {type:'FII',label:'FII/FPI'};
  return null;
}
function parseDeal(item){
  var t=item.title||'',full=t+' '+(item.desc||'');
  var sym='',coN='';
  for(var i=0;i<COMPANIES.length;i++){
    var c=COMPANIES[i],s=c.symbol.toUpperCase();
    if(new RegExp('\\b'+s.replace(/[&]/g,'\\&')+'\\b').test(full.toUpperCase())){sym=c.symbol;coN=c.name;break;}
    var n=c.name.split(' ')[0].toUpperCase();
    if(n.length>=6&&full.toUpperCase().indexOf(n)>-1){sym=c.symbol;coN=c.name;break;}
  }
  if(!sym) return null;
  var isBuy=/\b(buy|bought|acqui|purchas|increas|accumul)\b/i.test(full);
  var isSell=/\b(sell|sold|reduc|exit|offload|decreas)\b/i.test(full);
  if(!isBuy&&!isSell) return null;
  var inst=detInst(full);if(!inst) return null;
  var vm=full.match(/([\d,]+(?:\.\d+)?)\s*(?:crore|Cr|CR)/i);
  return{date:item.pub?new Date(item.pub).toLocaleDateString('en-IN',{day:'2-digit',month:'short'}):'',ts:item.pub?new Date(item.pub).getTime():Date.now(),symbol:sym,company:coN,client:inst.label,institution:inst,action:isBuy?'BUY':'SELL',valueCr:vm?parseFloat(vm[1].replace(/,/g,''))||0:0,headline:t};
}
function loadFIIData(){
  if(FII.loading) return;
  if(Date.now()-FII.lastFetch<900000){renderFII();return;}
  FII.loading=true;FII.log=[];renderFII();
  var qs=['bulk deal NSE FII FPI India 2025','block deal NSE FPI crore India 2025','"HDFC Mutual Fund" bought OR sold NSE','"ICICI Prudential" fund bought sold India','"SBI Mutual Fund" bought sold NSE','"Morgan Stanley" India NSE bought sold','FII bought sold India NSE crore today','FPI bought sold NSE India shares crore','promoter stake increased decreased NSE India'];
  var all=[],seen={};
  var r2jBase='https://api.rss2json.com/v1/api.json?rss_url=';
  var gnBase='https://news.google.com/rss/search?q=';
  var gnSuffix='&hl=en-IN&gl=IN&ceid=IN:en';
  Promise.all(qs.map(function(q){
    var url=r2jBase+encodeURIComponent(gnBase+encodeURIComponent(q)+gnSuffix);
    return withTimeout(fetch(url).then(function(r){return r.json();}),10000)
    .then(function(d){
      var items=(d&&d.items)||[];
      FII.log.push({q:q,n:items.length});
      items.forEach(function(item){
        var deal=parseDeal({title:(item.title||'').replace(/<[^>]+>/g,'').trim(),desc:(item.description||'').replace(/<[^>]+>/g,'').trim(),pub:item.pubDate||''});
        if(deal){var k=deal.headline.slice(0,60).toLowerCase();if(!seen[k]){seen[k]=1;all.push(deal);}}
      });
    }).catch(function(){FII.log.push({q:q,n:0,err:true});});
  })).then(function(){
    FII.deals=all;FII.lastFetch=Date.now();FII.loading=false;
    toast('✅ FII data — '+all.length+' deals found','#34d399');
    renderFII();
  });
}
function renderFII(){
  var p=document.getElementById('fp');if(!p)return;
  if(FII.loading){p.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:300px;color:#a78bfa;font-family:monospace;font-size:13px">⏳ FETCHING FII DATA…</div>';return;}
  if(!FII.lastFetch){
    p.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:400px;gap:16px"><div style="font-size:48px">🌍</div><div style="color:#a78bfa;font-size:13px;font-family:monospace;letter-spacing:2px">FII / MF TRACKER</div><div style="color:#475569;font-size:11px;font-family:monospace;text-align:center;line-height:1.8">Tracks FII/FPI + HDFC AMC + ICICI Pru + SBI MF<br>buying & selling across Nifty 750</div><button onclick="loadFIIData()" style="background:rgba(167,139,250,0.15);border:1px solid #a78bfa;color:#a78bfa;border-radius:6px;padding:10px 24px;font-size:12px;font-family:monospace;cursor:pointer">▶ LOAD FII DATA</button></div>';
    return;
  }
  var cutoff=wMs(FII.window),inst=FII.inst;
  var filtered=FII.deals.filter(function(d){
    if(d.ts<cutoff)return false;
    if(inst==='fii')return d.institution.type==='FII';
    if(inst==='hdfc')return d.institution.label==='HDFC AMC';
    if(inst==='icici')return d.institution.label==='ICICI PRU';
    if(inst==='sbi')return d.institution.label==='SBI MF';
    return true;
  });
  var byS={};
  filtered.forEach(function(d){
    if(!byS[d.symbol])byS[d.symbol]={sym:d.symbol,co:d.company,buy:0,sell:0,insts:new Set(),deals:[]};
    if(d.action==='BUY')byS[d.symbol].buy+=d.valueCr;else byS[d.symbol].sell+=d.valueCr;
    byS[d.symbol].insts.add(d.institution.label+'('+d.action+')');byS[d.symbol].deals.push(d);
  });
  var summ=Object.values(byS).map(function(s){s.net=s.buy-s.sell;s.sig=s.net>0.5?'BUY':s.net<-0.5?'SELL':'NEUTRAL';s.il=Array.from(s.insts);return s;}).sort(function(a,b){return Math.abs(b.net)-Math.abs(a.net);});
  var buyers=summ.filter(function(s){return s.sig==='BUY';});
  var sellers=summ.filter(function(s){return s.sig==='SELL';});
  var hits=FII.log.reduce(function(a,l){return a+(l.n||0);},0);

  var html='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">';
  html+='<div><div style="color:#a78bfa;font-weight:700;font-size:14px;font-family:monospace">🌍 FII / MF TRACKER</div>';
  html+='<div style="color:#475569;font-size:10px;font-family:monospace;margin-top:2px">'+FII.log.length+' sources · '+hits+' articles · '+FII.deals.length+' deals</div></div>';
  html+='<button onclick="FII.lastFetch=0;loadFIIData()" style="background:rgba(167,139,250,0.1);border:1px solid #a78bfa;color:#a78bfa;border-radius:4px;padding:5px 14px;font-size:10px;font-family:monospace;cursor:pointer">🔄 REFRESH</button></div>';
  // Controls
  html+='<div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">';
  html+='<div style="display:flex;gap:3px;background:#1e293b;border-radius:4px;padding:3px">';
  [{w:'3d',l:'3D'},{w:'7d',l:'7D'},{w:'15d',l:'15D'},{w:'1m',l:'1M'}].forEach(function(t){var a=FII.window===t.w;html+='<button onclick="fiiWin(this)" data-w="'+t.w+'" style="background:'+(a?'rgba(167,139,250,0.2)':'transparent')+';border:none;border-radius:3px;color:'+(a?'#a78bfa':'#64748b')+';padding:4px 10px;font-size:9px;font-family:monospace;font-weight:'+(a?700:400)+';cursor:pointer">'+t.l+'</button>';});
  html+='</div><div style="display:flex;gap:3px;background:#1e293b;border-radius:4px;padding:3px">';
  [{k:'all',l:'All'},{k:'fii',l:'FII'},{k:'hdfc',l:'HDFC'},{k:'icici',l:'ICICI'},{k:'sbi',l:'SBI MF'}].forEach(function(f){var a=FII.inst===f.k;html+='<button onclick="fiiInst(this)" data-k="'+f.k+'" style="background:'+(a?'rgba(251,191,36,0.15)':'transparent')+';border:none;border-radius:3px;color:'+(a?'#fbbf24':'#64748b')+';padding:4px 10px;font-size:9px;font-family:monospace;font-weight:'+(a?700:400)+';cursor:pointer">'+f.l+'</button>';});
  html+='</div></div>';
  // Stats
  html+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:16px">';
  [{l:'DEALS',v:filtered.length,c:'#60a5fa'},{l:'BUYING',v:buyers.length+' stocks',c:'#34d399'},{l:'SELLING',v:sellers.length+' stocks',c:'#f87171'},{l:'NET',v:summ.length?'₹'+summ.reduce(function(a,s){return a+s.net;},0).toFixed(0)+'Cr':'N/A',c:'#facc15'}].forEach(function(s){
    html+='<div style="background:#1e293b;border-radius:5px;padding:10px 12px"><div style="color:#475569;font-size:8px;font-family:monospace;margin-bottom:4px">'+s.l+'</div><div style="color:'+s.c+';font-size:14px;font-weight:700;font-family:monospace">'+s.v+'</div></div>';
  });
  html+='</div>';
  // Two columns
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">';
  function col(list,action,c){
    var h='<div><div style="color:'+c+';font-size:10px;font-family:monospace;font-weight:700;margin-bottom:8px;padding:6px 10px;background:'+c+'18;border-radius:4px;border-left:3px solid '+c+'">'+(action==='BUY'?'▲ BUYING':'▼ SELLING')+' ('+FII.window.toUpperCase()+')</div>';
    if(!list.length) h+='<div style="color:#475569;font-size:11px;text-align:center;padding:20px">No signals</div>';
    list.slice(0,15).forEach(function(s){
      var co_=COMPANIES.find(function(x){return x.symbol===s.sym;});
      h+='<div style="background:#1e293b;border-radius:5px;padding:10px 12px;margin-bottom:6px;border-left:3px solid '+c+'">'+
        '<div style="display:flex;justify-content:space-between"><span style="color:#e2e8f0;font-family:monospace;font-weight:700;font-size:12px">'+s.sym+'</span>'+(s.net?'<span style="color:'+c+';font-size:11px;font-family:monospace">'+(action==='BUY'?'▲':'▼')+' ₹'+Math.abs(s.net).toFixed(1)+'Cr</span>':'')+'</div>'+
        '<div style="color:#64748b;font-size:9px">'+(co_?co_.name.slice(0,28):s.co.slice(0,28))+'</div>'+
        '<div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:4px">'+s.il.slice(0,3).map(function(i){var ic=i.indexOf('FII')>-1||i.indexOf('FPI')>-1?'#60a5fa':'#fbbf24';return '<span style="color:'+ic+';background:'+ic+'18;border-radius:3px;padding:1px 5px;font-size:8px">'+i.slice(0,20)+'</span>';}).join('')+'</div>'+
      '</div>';
    });
    return h+'</div>';
  }
  html+=col(buyers,'BUY','#34d399')+col(sellers,'SELL','#f87171');
  html+='</div>';
  // Deal log
  if(filtered.length){
    html+='<div style="background:#1e293b;border-radius:6px;overflow:hidden"><table style="width:100%;border-collapse:collapse;font-size:10px;font-family:monospace"><thead><tr style="background:#0f172a">';
    ['DATE','SYMBOL','INSTITUTION','TYPE','ACTION','VALUE'].forEach(function(h){html+='<th style="color:#64748b;padding:6px 10px;text-align:left;font-size:8px">'+h+'</th>';});
    html+='</tr></thead><tbody>';
    filtered.sort(function(a,b){return b.ts-a.ts;}).slice(0,40).forEach(function(d,i){
      var tc=d.action==='BUY'?'#34d399':'#f87171',tyc=d.institution.type==='FII'?'#60a5fa':'#fbbf24';
      html+='<tr style="border-bottom:1px solid #0f172a;background:'+(i%2?'rgba(30,41,59,0.5)':'transparent')+'">'+
        '<td style="color:#64748b;padding:6px 10px">'+d.date+'</td>'+
        '<td style="color:#e2e8f0;font-weight:700;padding:6px 10px">'+d.symbol+'</td>'+
        '<td style="color:#94a3b8;padding:6px 10px;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+d.client+'</td>'+
        '<td style="padding:6px 10px"><span style="color:'+tyc+';background:'+tyc+'18;border-radius:3px;padding:1px 5px;font-size:8px">'+d.institution.type+'</span></td>'+
        '<td style="padding:6px 10px"><span style="color:'+tc+';font-weight:700">'+(d.action==='BUY'?'▲ BUY':'▼ SELL')+'</span></td>'+
        '<td style="color:'+(d.valueCr?tc:'#64748b')+';font-weight:700;padding:6px 10px">'+(d.valueCr?'₹'+d.valueCr.toFixed(1)+'Cr':'news')+'</td></tr>';
      html+='<tr style="border-bottom:1px solid #0f172a"><td colspan="6" style="color:#475569;font-size:9px;padding:2px 10px 6px;font-style:italic">'+d.headline.slice(0,120)+'</td></tr>';
    });
    html+='</tbody></table></div>';
  }
  p.innerHTML=html;
}
